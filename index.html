<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Joshua & Erin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ===========================
WOOD BACKGROUND
=========================== -->

<div id="opening-screen">

<div class="wood-background">

<div class="envelope">

<div class="flap"></div>

<div class="letter-preview"></div>

<div id="wax-seal">

<span>J&E</span>

</div>

</div>

<p class="tap-text">

Tap the wax seal

</p>

</div>

</div>

<!-- ===========================
INVITATION
=========================== -->

<main id="invitation">

<!-- HERO -->

<section class="hero">

<div class="hero-text">

<p class="eyebrow">

Together with our families

</p>

<h1>

Joshua

<span>&</span>

Erin

</h1>

<p class="date">

November 2026

</p>

</div>

<div class="hero-image">

<img src="assets/images/hero-portrait.png"alt="Joshua and Erin">

</div>

</section>

<!-- DETAILS -->

<section class="content-section">

<h2>

Wedding Details

</h2>

<div class="details-grid">

<div>

<h3>Date</h3>

<p id="wedding-date"></p>

</div>

<div>

<h3>Time</h3>

<p id="ceremony-time"></p>

</div>

<div>

<h3>Venue</h3>

<p id="ceremony-venue"></p>

</div>

<div>

<h3>Dress Code</h3>

<p id="dress-code"></p>

</div>

</div>

</section>

<!-- RECEPTION -->

<section class="content-section">

<h2>

Reception

</h2>

<p id="reception-text"></p>

</section>

<!-- ACCOMMODATION -->

<section class="content-section">

<h2>

Accommodation

</h2>

<div id="hotel-list">

</div>

</section>

<!-- MAP -->

<section class="content-section">

<h2>

Location

</h2>

<div class="map-placeholder">

Map Coming Soon

</div>

<a id="map-button"

target="_blank">

Open in Google Maps

</a>

</section>

<!-- RSVP -->

<section class="content-section">

<h2>

RSVP

</h2>

<form>

<input
type="text"
placeholder="First Name">

<input
type="text"
placeholder="Surname">

<input
type="number"
placeholder="Guests">

<select>

<option>

Will Attend

</option>

<option>

Joyfully Accept

</option>

<option>

Regretfully Decline

</option>

</select>

<textarea
placeholder="Dietary Requirements">

</textarea>

<button>

Submit RSVP

</button>

</form>

</section>

<!-- CLOSING -->

<section class="closing">

<p id="closing-message">

</p>

<h2>

Joshua & Erin

</h2>

</section>

</main>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
